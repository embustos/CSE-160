<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CSE 160 Assignment 0</title>
  </head>

  <body onload="main()">
    <canvas id="cnv1" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <br><br>

    <!-- Input for vector v1 -->
    <label for="xcoord">v1 x:</label>
    <input type="text" id="xcoord" name="xcoord" required minlength="4" maxlength="8" size="10" />

    <label for="ycoord">y:</label>
    <input type="text" id="ycoord" name="ycoord" required minlength="4" maxlength="8" size="10" />

    <br><br>

    <!-- Input for vector v2 -->
    <label for="xcoord2">v2 x:</label>
    <input type="text" id="xcoord2" name="xcoord2" required minlength="4" maxlength="8" size="10" />

    <label for="ycoord2">y:</label>
    <input type="text" id="ycoord2" name="ycoord2" required minlength="4" maxlength="8" size="10" />

    <br><br>

    <!-- Button to trigger the draw event -->
    <button onclick="handleDrawEvent()">Draw</button>

    <br><br>

    <!-- Operation selection -->
    <label for="operation-select">Operation:</label>

    <select name="ops" id="operation-select">
      <option value="">--Please choose an option--</option>
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="angle">Angle Between</option>
      <option value="area">Area</option>
      <option value="mag">Magnitude</option>
      <option value="norm">Normalize</option>
    </select>

    <!-- Scalar input for division and multiplication -->
    <label for="scalar">Scalar:</label>
    <input type="text" id="scalar" name="scalar" required minlength="4" maxlength="8" size="10" />

    <br><br>
     <!-- Button to trigger the draw event -->
    <button onclick="handleDrawOperationEvent()">Draw</button>

    <script src="../lib/cuon-matrix-cse160.js"></script>

  </body>
</html>
